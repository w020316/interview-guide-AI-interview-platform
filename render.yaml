# Render 部署配置
# 使用方法: Render Dashboard → New → Blueprint → 选择此仓库
services:
  - type: web
    name: interview-guide-backend
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # ── Agnes AI ──
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://apihub.agnes-ai.com
      - key: AI_CHAT_MODEL
        value: agnes-2.0-flash
      - key: AI_EMBEDDING_MODEL
        value: text-embedding-3-small
      # ── Supabase PostgreSQL ──
      - key: DATABASE_URL
        sync: false  # jdbc:postgresql://xxx.supabase.co:5432/postgres
      - key: DATABASE_USER
        value: postgres.pzaigjphybqzqlhcvytt
      - key: DATABASE_PASSWORD
        sync: false
      # ── Upstash Redis ──
      - key: REDIS_URL
        sync: false
      - key: REDIS_SSL
        value: "true"
      # ── JWT ──
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      # ── Supabase Storage ──
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: resumes
      # ── JVM 内存（适配 Render 免费层 512MB）──
      - key: JAVA_OPTS
        value: "-Xmx384m -Xms128m -XX:+UseZGC -XX:MaxMetaspaceSize=128m"
