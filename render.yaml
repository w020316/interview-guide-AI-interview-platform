# Render 部署配置（方案 B：Vercel + Render + Supabase）
# 文档：https://render.com/docs/blueprint-spec
# 使用：在 Render Dashboard → New → Blueprint → 选择仓库，自动读取此文件
#
# Render 免费层特性：
# - 512MB 内存
# - 5GB 带宽/月
# - 15 分钟无访问自动休眠（用 UptimeRobot 保活）
# - 不需要信用卡
# - 支持 Docker 部署

services:
  - type: web
    name: interview-guide-backend
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    # Render 会自动注入 PORT 环境变量，应用需监听此端口
    # Spring Boot 通过 server.port=${PORT:8080} 适配
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AI_API_KEY
        sync: false  # 在 Render 后台手动填写 Agnes AI Key
      - key: AI_BASE_URL
        value: https://apihub.agnes-ai.com/v1
      - key: AI_MODEL
        value: agnes-base
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        value: postgres
      - key: DATABASE_PASSWORD
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false
      # JVM 参数优化（适配 512MB 内存）
      - key: JAVA_OPTS
        value: "-Xmx384m -Xms128m -XX:+UseZGC -XX:MaxMetaspaceSize=128m"
      # Render 健康检查端点
      - key: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
        value: "never"
