# 生产环境配置（云端部署用）
server:
  port: ${PORT:8080}

spring:
  application:
    name: interview-guide
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: false

  # Supabase PostgreSQL（用户名/密码直接写在 DATABASE_URL 里，避免环境变量未注入问题）
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate

  # Redis（Upstash，TLS 连接）
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 5000
      ssl:
        enabled: true

  # Spring AI（Agnes AI，兼容 OpenAI 协议）
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL:https://apihub.agnes-ai.com}
      chat:
        options:
          model: ${AI_MODEL:agnes-2.0-flash}
          temperature: 0.3
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  supabase:
    url: ${SUPABASE_URL}
    service-key: ${SUPABASE_SERVICE_KEY}
    bucket: resumes

logging:
  level:
    com.example.interview: WARN
    org.springframework: WARN
