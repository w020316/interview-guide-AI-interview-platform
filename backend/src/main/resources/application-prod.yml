# 生产环境配置（云端部署用）
server:
  port: ${PORT:8080}

spring:
  application:
    name: interview-guide
  threads:
    virtual:
      enabled: true

  # Supabase PostgreSQL
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis（Upstash 或本地）
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  # Spring AI（Agnes AI，兼容 OpenAI 协议，免费无限量）
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL:https://apihub.agnes-ai.com/v1}
      chat:
        options:
          model: ${AI_MODEL:agnes-base}
          temperature: 0.3
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.example.interview: WARN
    org.springframework: WARN
