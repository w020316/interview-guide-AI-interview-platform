spring:
  application:
    name: interview-guide

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/interview}
    # Supabase Session pooler 用户名格式为 postgres.<project-ref>，需通过环境变量注入
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: ${REDIS_SSL:false}

  ai:
    openai:
      api-key: ${AI_API_KEY:sk-placeholder}
      # 注意：Agnes AI base URL 不带 /v1 后缀
      base-url: ${AI_BASE_URL:https://apihub.agnes-ai.com}
      chat:
        options:
          model: ${AI_CHAT_MODEL:agnes-2.0-flash}
          temperature: 0.7
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: interview-guide

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  info:
    # 应用元数据，暴露到 /actuator/info 端点
    # 版本号与前端 changelog.ts 保持同步，修改时两处一起更新
    name: ${APP_INFO_NAME:interview-guide}
    version: ${APP_INFO_VERSION:1.13.0}
    description: ${APP_INFO_DESCRIPTION:AI 智能面试辅助平台后端}
    # 构建日期，CI 注入；未配置时 fallback 为当天
    build-date: ${APP_INFO_BUILD_DATE:}
  sse:
    # SSE 流式回答最大并发数，超出返回 503
    # Render 免费层建议 20，付费层可调高
    max-concurrent: ${SSE_MAX_CONCURRENT:20}
  rag:
    # 知识库导入去重相似度阈值（0.0~1.0），相似度 >= 此值视为重复，跳过导入
    # 0.90 对应 cosine distance <= 0.10，覆盖文本微调后重复的场景
    # 调低可更严格去重（如 0.85），调高可放宽（如 0.95）
    dedup-similarity-threshold: ${RAG_DEDUP_THRESHOLD:0.90}
  cors:
    # 允许的前端来源（逗号分隔），生产精确域名 + 本地调试
    # 修改部署域名时改环境变量 CORS_ALLOWED_ORIGINS 即可，无需改代码
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://interview-guide-ai-interview-platform.vercel.app,https://interview-guide-ai-interview-platform.pages.dev,http://localhost:5173,http://127.0.0.1:5173}
  supabase:
    url: ${SUPABASE_URL:https://your-project.supabase.co}
    service-key: ${SUPABASE_SERVICE_KEY:your-service-key}
    bucket: ${SUPABASE_BUCKET:resumes}

logging:
  level:
    com.example.interview: INFO
    org.springframework.ai: WARN
    org.hibernate.SQL: WARN
