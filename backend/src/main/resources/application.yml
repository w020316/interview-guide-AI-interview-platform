spring:
  application:
    name: interview-guide

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/interview}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: ${REDIS_SSL:false}

  ai:
    openai:
      api-key: ${AI_API_KEY:sk-placeholder}
      base-url: ${AI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${AI_CHAT_MODEL:gpt-3.5-turbo}
          temperature: 0.7
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: interview-guide

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-must-be-32-chars-min!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  supabase:
    url: ${SUPABASE_URL:https://your-project.supabase.co}
    service-key: ${SUPABASE_SERVICE_KEY:your-service-key}
    bucket: ${SUPABASE_BUCKET:resumes}

logging:
  level:
    com.example.interview: INFO
    org.springframework.ai: WARN
    org.hibernate.SQL: WARN
