server:
  port: 8080

spring:
  application:
    name: interview-guide
  threads:
    virtual:
      enabled: true

  # PostgreSQL + pgvector（本地开发用 Docker 启动，端口 5432）
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:interview_guide}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Spring AI 配置（通义千问兼容 OpenAI 协议）
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:sk-placeholder}
      base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: ${AI_MODEL:qwen-max}
          temperature: 0.3
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v3}
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 监控端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.example.interview: INFO
    org.springframework.ai: INFO
